    client_config:
      protocol: https
      host: <domain>
      authentication:
        strategy: bearer
        configuration:
          token: <access_token>

    test_request:
      method: GET
      path: /health

    endpoints:
      - name: users
        requests:
          read:
            method: GET
            path: /identity/search
            query_params:
              - name: email
                value: <email>
            param_values:
              - name: email
                identity: email
            data_path: users